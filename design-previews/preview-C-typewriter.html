<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方向 C — 复古打印机</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #FFF8E7;
    --bg-card:    #FFFDF5;
    --line:       #D8CFA8;
    --line-dash:  #C4BC96;
    --text:       #1A1200;
    --text-muted: #756B40;
    --text-faint: #B0A87A;
    --accent:     #FF3B00;
    --accent-bg:  rgba(255,59,0,0.05);
    --done:       #B0A87A;
    --font-mono:  'Courier New', 'Courier', monospace;
    --font-body:  'Noto Sans SC', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* SPROCKET HOLES */
  body::before, body::after {
    content: '';
    position: fixed;
    top: 0; bottom: 0;
    width: 28px;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 16px,
      var(--line) 16px,
      var(--line) 17px,
      transparent 17px,
      transparent 24px,
      var(--bg) 24px,
      var(--bg) 34px,
      transparent 34px,
      transparent 40px
    );
    z-index: 200;
    pointer-events: none;
  }
  body::before { left: 0; border-right: 1px solid var(--line); }
  body::after  { right: 0; border-left: 1px solid var(--line); }

  /* HEADER */
  header {
    background: var(--bg-card);
    border-bottom: 2px solid var(--text);
    padding: 0 52px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: bold;
    color: var(--text);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .logo-sub {
    font-size: 10px;
    letter-spacing: 0.24em;
    color: var(--text-muted);
    margin-top: -4px;
    text-transform: uppercase;
  }

  .nav {
    display: flex;
    gap: 0;
    border: 2px solid var(--text);
  }
  .nav-btn {
    padding: 0 18px;
    height: 32px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
    background: transparent;
    border: none;
    border-right: 2px solid var(--text);
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    outline: none;
  }
  .nav-btn:last-child { border-right: none; }
  .nav-btn:hover { background: var(--text); color: var(--bg); }
  .nav-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* MAIN */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 36px 16px 80px;
  }

  /* PAGE HEADER — receipt style */
  .receipt-header {
    text-align: center;
    padding: 20px 0;
    border-bottom: 2px dashed var(--line-dash);
    margin-bottom: 20px;
  }
  .receipt-header .rh-date {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .receipt-header .rh-title {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text);
    margin: 4px 0;
  }
  .receipt-header .rh-sub {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
  }

  /* CUT LINE */
  .cut-line {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 20px 0;
    color: var(--text-faint);
    font-size: 11px;
    letter-spacing: 0.12em;
  }
  .cut-line::before, .cut-line::after {
    content: '';
    flex: 1;
    border-top: 1.5px dashed var(--line-dash);
  }
  .cut-icon { font-size: 14px; }

  /* DATE ROW */
  .date-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin: 16px 0 8px;
  }
  .date-num {
    font-size: 36px;
    font-weight: bold;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.04em;
  }
  .date-txt {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* CARD */
  .card {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--line-dash);
    position: relative;
    cursor: pointer;
    transition: background 0.1s;
  }
  .card:hover { background: var(--accent-bg); padding-left: 4px; }
  .card.done { opacity: 0.4; }

  /* checkbox — printed X */
  .cb {
    width: 16px; height: 16px;
    border: 2px solid var(--text);
    background: transparent;
    flex-shrink: 0;
    margin-top: 3px;
    cursor: pointer;
    position: relative;
    font-size: 12px;
    font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    transition: background 0.1s;
  }
  .cb.checked { background: var(--text); }
  .cb.checked::before {
    content: '✓';
    color: var(--bg);
    font-size: 10px;
    line-height: 1;
  }

  .card-body { flex: 1; }
  .card-title {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 0.04em;
    color: var(--text);
  }
  .card.done .card-title {
    font-weight: normal;
    text-decoration: line-through;
    color: var(--done);
  }
  .card-meta {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    margin-top: 2px;
  }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .tag {
    font-size: 10px;
    padding: 1px 8px;
    border: 1.5px solid var(--text);
    color: var(--text);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: bold;
  }
  .tag.accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .card-actions {
    opacity: 0;
    transition: opacity 0.15s;
    display: flex; gap: 6px;
    flex-shrink: 0;
  }
  .card:hover .card-actions { opacity: 1; }
  .action-btn {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 2px 8px;
    border: 2px solid var(--text);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background 0.1s, color 0.1s;
  }
  .action-btn:hover { background: var(--text); color: var(--bg); }
  .action-btn.danger:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* TOTAL LINE */
  .total-line {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-top: 2px solid var(--text);
    margin-top: 8px;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .total-line .accent { color: var(--accent); }

  /* FAB — stamp style */
  .fab {
    position: fixed;
    bottom: 36px;
    right: 48px;
    width: 56px; height: 56px;
    background: var(--accent);
    color: #fff;
    border: 3px solid var(--accent);
    font-size: 24px;
    font-weight: bold;
    font-family: var(--font-mono);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 3px 3px 0 var(--text);
    transition: box-shadow 0.1s, transform 0.1s;
  }
  .fab:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 var(--text);
  }
  .fab:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--text);
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">日程管理</div>
    <div class="logo-sub">Personal Planner</div>
  </div>
  <nav class="nav">
    <button class="nav-btn">年览</button>
    <button class="nav-btn active">月历</button>
    <button class="nav-btn">日程</button>
  </nav>
</header>

<main>
  <div class="receipt-header">
    <div class="rh-date">Printed: 2025-06-30 09:41:22</div>
    <div class="rh-title">June  2025</div>
    <div class="rh-sub">Total: 9 tasks &nbsp;|&nbsp; Done: 3 &nbsp;|&nbsp; Remaining: 6</div>
  </div>

  <!-- Tasks -->
  <div class="date-row">
    <div class="date-num">30</div>
    <div class="date-txt">Jun · Mon</div>
  </div>

  <div class="card">
    <div class="cb"></div>
    <div class="card-body">
      <div class="card-title">完成 Q2 产品路线图评审</div>
      <div class="card-meta">10:00 - 11:30</div>
      <div class="card-tags"><span class="tag accent">工作</span><span class="tag">会议</span></div>
    </div>
    <div class="card-actions">
      <button class="action-btn">编辑</button>
      <button class="action-btn danger">删除</button>
    </div>
  </div>

  <div class="card">
    <div class="cb"></div>
    <div class="card-body">
      <div class="card-title">准备周五的技术分享材料</div>
      <div class="card-meta">全天</div>
      <div class="card-tags"><span class="tag">学习</span></div>
    </div>
    <div class="card-actions">
      <button class="action-btn">编辑</button>
      <button class="action-btn danger">删除</button>
    </div>
  </div>

  <div class="card done">
    <div class="cb checked"></div>
    <div class="card-body">
      <div class="card-title">更新依赖包版本</div>
      <div class="card-meta">09:00 - 09:30</div>
    </div>
    <div class="card-actions">
      <button class="action-btn">编辑</button>
      <button class="action-btn danger">删除</button>
    </div>
  </div>

  <div class="cut-line"><span class="cut-icon">✂</span>28 JUN</div>

  <div class="date-row">
    <div class="date-num">28</div>
    <div class="date-txt">Jun · Sat</div>
  </div>

  <div class="card done">
    <div class="cb checked"></div>
    <div class="card-body">
      <div class="card-title">阅读《SICP》第三章</div>
      <div class="card-meta">14:00 - 16:00</div>
      <div class="card-tags"><span class="tag">学习</span></div>
    </div>
    <div class="card-actions">
      <button class="action-btn">编辑</button>
      <button class="action-btn danger">删除</button>
    </div>
  </div>

  <div class="total-line">
    <span>本月合计</span>
    <span>9 tasks &nbsp;— &nbsp;<span class="accent">3 done</span></span>
  </div>

  <div class="cut-line"><span class="cut-icon">✂</span>END OF REPORT</div>
</main>

<button class="fab" aria-label="新建计划">+</button>

</body>
</html>
