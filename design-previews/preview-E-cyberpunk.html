<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方向 E — 赛博霓虹</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #070B14;
    --bg-panel:   #0D1421;
    --bg-card:    #111827;
    --bg-hover:   #151E2E;
    --grid:       rgba(0,200,255,0.04);
    --line:       rgba(0,200,255,0.12);
    --line-bright:rgba(0,200,255,0.35);
    --text:       #C8E0FF;
    --text-muted: #5A7BA8;
    --text-faint: #2A3D5A;
    --cyan:       #00C8FF;
    --cyan-glow:  rgba(0,200,255,0.25);
    --magenta:    #FF2D78;
    --magenta-glow:rgba(255,45,120,0.25);
    --yellow:     #FFE000;
    --green:      #00FF88;
    --done:       #2A3D5A;
    --font-mono:  'JetBrains Mono', monospace;
    --font-body:  'Noto Sans SC', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scan line */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    animation: scan 6s linear infinite;
    opacity: 0.6;
    z-index: 999;
    pointer-events: none;
  }
  @keyframes scan {
    0%   { top: 0; }
    100% { top: 100vh; }
  }

  /* HEADER */
  header {
    background: rgba(7,11,20,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--line);
    padding: 0 32px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cyan);
    text-shadow: 0 0 12px var(--cyan-glow);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 28px; height: 28px;
    border: 1.5px solid var(--cyan);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    box-shadow: 0 0 8px var(--cyan-glow), inset 0 0 8px rgba(0,200,255,0.1);
  }

  .nav {
    display: flex;
    gap: 2px;
    border: 1px solid var(--line-bright);
    padding: 3px;
    background: rgba(0,200,255,0.03);
  }
  .nav-btn {
    padding: 0 18px;
    height: 30px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: transparent;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    outline: none;
  }
  .nav-btn:hover {
    color: var(--cyan);
    border-color: var(--line);
    background: var(--cyan-glow);
  }
  .nav-btn.active {
    color: var(--bg);
    background: var(--cyan);
    border-color: var(--cyan);
    font-weight: 700;
    text-shadow: none;
    box-shadow: 0 0 12px var(--cyan-glow);
  }

  /* MAIN */
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 32px 24px 100px;
    position: relative;
    z-index: 1;
  }

  /* HUD header */
  .hud-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 28px;
  }
  .hud-title {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .hud-title-main {
    font-family: var(--font-mono);
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .hud-title-main .accent { color: var(--cyan); text-shadow: 0 0 16px var(--cyan-glow); }
  .hud-stats {
    text-align: right;
  }
  .stat {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 3px;
  }
  .stat strong { color: var(--cyan); font-weight: 600; }
  .stat .red { color: var(--magenta); }

  /* PROGRESS ARC */
  .hud-progress {
    background: var(--bg-panel);
    border: 1px solid var(--line);
    padding: 14px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--text-faint);
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    position: absolute;
    top: 0; left: 0; height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--green));
    box-shadow: 0 0 8px var(--cyan-glow);
    width: 33%;
    animation: fillAnim 1.2s ease-out;
  }
  @keyframes fillAnim {
    from { width: 0; }
    to   { width: 33%; }
  }
  .progress-label {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .progress-label strong { color: var(--cyan); }

  /* MONTH RINGS ROW */
  .ring-row {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .ring-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 8px;
    border: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .ring-cell:hover { border-color: var(--line); }
  .ring-cell.active { border-color: var(--cyan); background: rgba(0,200,255,0.04); }
  .ring-cell svg { display: block; }
  .ring-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* DATE GROUP */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 24px 0 12px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .section-header::before {
    content: '▶';
    color: var(--cyan);
    font-size: 8px;
  }
  .section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--line-bright), transparent);
  }

  /* CARD */
  .card {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-left: 2px solid var(--cyan);
    margin-bottom: 6px;
    position: relative;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, var(--cyan), transparent);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .card:hover {
    background: var(--bg-hover);
    border-color: var(--line-bright);
    border-left-color: var(--cyan);
    box-shadow: 0 0 20px rgba(0,200,255,0.08);
  }
  .card:hover::before { opacity: 1; }
  .card.done {
    border-left-color: var(--text-faint);
    opacity: 0.4;
  }
  .card.urgent { border-left-color: var(--magenta); }
  .card.urgent::before { background: linear-gradient(90deg, var(--magenta), transparent); }

  /* checkbox */
  .cb {
    width: 16px; height: 16px;
    border: 1.5px solid var(--text-faint);
    background: transparent;
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.1s;
  }
  .cb:hover { border-color: var(--cyan); box-shadow: 0 0 6px var(--cyan-glow); }
  .cb.checked {
    background: var(--cyan);
    border-color: var(--cyan);
    box-shadow: 0 0 8px var(--cyan-glow);
  }
  .cb.checked::after {
    content: '';
    position: absolute;
    left: 3px; top: 0px;
    width: 7px; height: 11px;
    border: 2px solid var(--bg);
    border-top: none; border-left: none;
    transform: rotate(40deg);
  }

  .card-body { flex: 1; min-width: 0; }
  .card-id {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
    margin-bottom: 3px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }
  .card.done .card-title {
    text-decoration: line-through;
    color: var(--done);
  }
  .card-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
  }
  .card-tags { display: flex; gap: 5px; margin-top: 7px; }
  .tag {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
    padding: 2px 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
  }
  .tag.pink {
    border-color: var(--magenta);
    color: var(--magenta);
  }
  .tag.green {
    border-color: var(--green);
    color: var(--green);
  }

  .card-actions {
    display: flex; gap: 6px;
    opacity: 0; transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .card:hover .card-actions { opacity: 1; }
  .action-btn {
    width: 28px; height: 28px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .action-btn:hover { color: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 8px var(--cyan-glow); }
  .action-btn.danger:hover { color: var(--magenta); border-color: var(--magenta); box-shadow: 0 0 8px var(--magenta-glow); }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 32px; right: 32px;
    width: 54px; height: 54px;
    background: transparent;
    border: 1.5px solid var(--cyan);
    color: var(--cyan);
    font-size: 22px;
    font-weight: 300;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px var(--cyan-glow), inset 0 0 20px rgba(0,200,255,0.05);
    transition: all 0.2s;
    animation: pulse 3s ease-in-out infinite;
    z-index: 50;
  }
  .fab:hover {
    background: var(--cyan);
    color: var(--bg);
    box-shadow: 0 0 40px var(--cyan-glow);
    animation: none;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px var(--cyan-glow), inset 0 0 20px rgba(0,200,255,0.05); }
    50%       { box-shadow: 0 0 35px var(--cyan-glow), inset 0 0 30px rgba(0,200,255,0.08); }
  }

  /* corner decorations */
  .card .corner-tl, .card .corner-br {
    position: absolute;
    width: 8px; height: 8px;
    border-color: var(--cyan);
    border-style: solid;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .card .corner-tl { top: 4px; right: 4px; border-width: 1px 1px 0 0; }
  .card .corner-br { bottom: 4px; left: 20px; border-width: 0 0 1px 1px; }
  .card:hover .corner-tl, .card:hover .corner-br { opacity: 0.5; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">◈</div>
    PLANR
  </div>
  <nav class="nav">
    <button class="nav-btn">年览</button>
    <button class="nav-btn active">月历</button>
    <button class="nav-btn">日程</button>
  </nav>
</header>

<main>
  <div class="hud-header">
    <div>
      <div class="hud-title">// CURRENT_PERIOD</div>
      <div class="hud-title-main">2025 <span class="accent">JUN</span></div>
    </div>
    <div class="hud-stats">
      <div class="stat">TOTAL &nbsp;<strong>9</strong></div>
      <div class="stat">DONE &nbsp;<strong>3</strong></div>
      <div class="stat">REMAIN &nbsp;<span class="red">6</span></div>
    </div>
  </div>

  <div class="hud-progress">
    <div class="progress-label"><strong>33%</strong> COMPLETE</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="progress-label">3 / 9</div>
  </div>

  <!-- ring row -->
  <div class="ring-row">
    <div class="ring-cell">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="14" fill="none" stroke="#2A3D5A" stroke-width="3"/>
        <circle cx="20" cy="20" r="14" fill="none" stroke="#00C8FF" stroke-width="3"
          stroke-dasharray="88" stroke-dashoffset="22" stroke-linecap="butt" transform="rotate(-90 20 20)"/>
        <text x="20" y="24" text-anchor="middle" fill="#5A7BA8" font-size="8" font-family="JetBrains Mono">75%</text>
      </svg>
      <div class="ring-label">JAN</div>
    </div>
    <div class="ring-cell">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="14" fill="none" stroke="#2A3D5A" stroke-width="3"/>
        <circle cx="20" cy="20" r="14" fill="none" stroke="#00C8FF" stroke-width="3"
          stroke-dasharray="88" stroke-dashoffset="35" stroke-linecap="butt" transform="rotate(-90 20 20)"/>
        <text x="20" y="24" text-anchor="middle" fill="#5A7BA8" font-size="8" font-family="JetBrains Mono">60%</text>
      </svg>
      <div class="ring-label">FEB</div>
    </div>
    <div class="ring-cell">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="14" fill="none" stroke="#2A3D5A" stroke-width="3"/>
        <circle cx="20" cy="20" r="14" fill="none" stroke="#00FF88" stroke-width="3"
          stroke-dasharray="88" stroke-dashoffset="0" stroke-linecap="butt" transform="rotate(-90 20 20)"/>
        <text x="20" y="24" text-anchor="middle" fill="#00FF88" font-size="8" font-family="JetBrains Mono">100</text>
      </svg>
      <div class="ring-label">MAR</div>
    </div>
    <div class="ring-cell">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="14" fill="none" stroke="#2A3D5A" stroke-width="3"/>
        <circle cx="20" cy="20" r="14" fill="none" stroke="#00C8FF" stroke-width="3"
          stroke-dasharray="88" stroke-dashoffset="44" stroke-linecap="butt" transform="rotate(-90 20 20)"/>
        <text x="20" y="24" text-anchor="middle" fill="#5A7BA8" font-size="8" font-family="JetBrains Mono">50%</text>
      </svg>
      <div class="ring-label">APR</div>
    </div>
    <div class="ring-cell">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="14" fill="none" stroke="#2A3D5A" stroke-width="3"/>
        <text x="20" y="24" text-anchor="middle" fill="#2A3D5A" font-size="8" font-family="JetBrains Mono">0%</text>
      </svg>
      <div class="ring-label">MAY</div>
    </div>
    <div class="ring-cell active">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="14" fill="none" stroke="#2A3D5A" stroke-width="3"/>
        <circle cx="20" cy="20" r="14" fill="none" stroke="#00C8FF" stroke-width="3"
          stroke-dasharray="88" stroke-dashoffset="59" stroke-linecap="butt" transform="rotate(-90 20 20)"/>
        <text x="20" y="24" text-anchor="middle" fill="#00C8FF" font-size="8" font-family="JetBrains Mono">33%</text>
      </svg>
      <div class="ring-label" style="color:#00C8FF">JUN</div>
    </div>
  </div>

  <div class="section-header">2025-06-30 &nbsp; MONDAY</div>

  <div class="card urgent">
    <div class="corner-tl"></div>
    <div class="corner-br"></div>
    <div class="cb"></div>
    <div class="card-body">
      <div class="card-id">TASK#0041</div>
      <div class="card-title">完成 Q2 产品路线图评审</div>
      <div class="card-meta">10:00 → 11:30</div>
      <div class="card-tags"><span class="tag pink">工作</span><span class="tag">会议</span></div>
    </div>
    <div class="card-actions">
      <button class="action-btn">✎</button>
      <button class="action-btn danger">✕</button>
    </div>
  </div>

  <div class="card">
    <div class="corner-tl"></div>
    <div class="corner-br"></div>
    <div class="cb"></div>
    <div class="card-body">
      <div class="card-id">TASK#0042</div>
      <div class="card-title">准备周五的技术分享材料</div>
      <div class="card-meta">全天</div>
      <div class="card-tags"><span class="tag green">学习</span></div>
    </div>
    <div class="card-actions">
      <button class="action-btn">✎</button>
      <button class="action-btn danger">✕</button>
    </div>
  </div>

  <div class="card done">
    <div class="cb checked"></div>
    <div class="card-body">
      <div class="card-id">TASK#0040</div>
      <div class="card-title">更新依赖包版本</div>
      <div class="card-meta">09:00 → 09:30</div>
    </div>
    <div class="card-actions">
      <button class="action-btn">✎</button>
      <button class="action-btn danger">✕</button>
    </div>
  </div>

  <div class="section-header">2025-06-28 &nbsp; SATURDAY</div>

  <div class="card done">
    <div class="cb checked"></div>
    <div class="card-body">
      <div class="card-id">TASK#0038</div>
      <div class="card-title">阅读《SICP》第三章</div>
      <div class="card-meta">14:00 → 16:00</div>
      <div class="card-tags"><span class="tag green">学习</span></div>
    </div>
    <div class="card-actions">
      <button class="action-btn">✎</button>
      <button class="action-btn danger">✕</button>
    </div>
  </div>
</main>

<button class="fab" aria-label="新建计划">+</button>

</body>
</html>
