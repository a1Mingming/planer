<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方向 D — 柔和莫兰迪</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #EEE9F0;
    --bg-card:    #F7F4F9;
    --bg-white:   #FCFAFD;
    --line:       #D8D0E0;
    --line-light: rgba(155,127,168,0.15);
    --text:       #3D3847;
    --text-muted: #7E7589;
    --text-faint: #B3ADC0;
    --accent:     #9B7FA8;
    --accent-bg:  rgba(155,127,168,0.1);
    --green:      #87A878;
    --green-bg:   rgba(135,168,120,0.1);
    --done:       #B3ADC0;
    --shadow-sm:  0 1px 4px rgba(61,56,71,0.06), 0 4px 16px rgba(61,56,71,0.06);
    --shadow-md:  0 2px 8px rgba(61,56,71,0.08), 0 8px 24px rgba(61,56,71,0.08);
    --font-display: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
    --font-body:    'Noto Sans SC', 'PingFang SC', sans-serif;
    --radius:     12px;
    --radius-sm:  8px;
    --radius-tag: 20px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.65;
    min-height: 100vh;
  }

  /* Soft mesh background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(155,127,168,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 10% 80%, rgba(135,168,120,0.1) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    background: rgba(252,250,253,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line-light);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--text);
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }

  .nav {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 4px;
    border: 1px solid var(--line);
  }
  .nav-btn {
    padding: 0 16px;
    height: 30px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    background: transparent;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    outline: none;
  }
  .nav-btn:hover { color: var(--text); background: var(--bg-card); }
  .nav-btn.active {
    color: var(--accent);
    background: var(--bg-white);
    font-weight: 500;
    box-shadow: var(--shadow-sm);
  }

  /* MAIN */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 24px 100px;
    position: relative;
    z-index: 1;
  }

  .page-header {
    margin-bottom: 28px;
  }
  .page-title {
    font-family: var(--font-display);
    font-size: 30px;
    color: var(--text);
    letter-spacing: 0.04em;
    line-height: 1.2;
  }
  .page-sub {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 300;
    margin-top: 6px;
    letter-spacing: 0.06em;
  }

  /* PROGRESS BAR */
  .progress-wrap {
    margin: 20px 0 28px;
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 16px 20px;
    box-shadow: var(--shadow-sm);
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
    font-weight: 300;
  }
  .progress-label strong { color: var(--accent); font-weight: 500; }
  .progress-track {
    height: 6px;
    background: var(--line);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #C4A8D4);
    border-radius: 99px;
    width: 33%;
  }

  /* DATE GROUP */
  .date-group { margin-bottom: 20px; }
  .date-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    padding: 0 4px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .date-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  /* CARDS */
  .card {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--bg-card);
    border-radius: var(--radius);
    border: 1px solid transparent;
    margin-bottom: 8px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .card:hover {
    border-color: var(--line);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .card.done { opacity: 0.45; }

  /* checkbox */
  .cb {
    width: 18px; height: 18px;
    border: 1.5px solid var(--line);
    border-radius: 50%;
    background: transparent;
    flex-shrink: 0;
    margin-top: 1px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s, background 0.15s;
  }
  .cb:hover { border-color: var(--accent); }
  .cb.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .cb.checked::after {
    content: '';
    position: absolute;
    left: 5px; top: 2px;
    width: 5px; height: 9px;
    border: 2px solid #fff;
    border-top: none; border-left: none;
    transform: rotate(40deg);
  }

  .card-body { flex: 1; min-width: 0; }
  .card-title {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.4;
  }
  .card.done .card-title {
    text-decoration: line-through;
    color: var(--done);
  }
  .card-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
    font-weight: 300;
  }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .tag {
    font-size: 11px;
    font-weight: 400;
    padding: 2px 10px;
    border-radius: var(--radius-tag);
    background: var(--accent-bg);
    color: var(--accent);
    border: 1px solid rgba(155,127,168,0.2);
  }
  .tag.green {
    background: var(--green-bg);
    color: var(--green);
    border-color: rgba(135,168,120,0.25);
  }
  .tag.neutral {
    background: transparent;
    color: var(--text-faint);
    border-color: var(--line);
  }

  .card-actions {
    opacity: 0;
    transition: opacity 0.15s;
    display: flex; gap: 6px;
    flex-shrink: 0;
    align-items: center;
  }
  .card:hover .card-actions { opacity: 1; }
  .action-btn {
    width: 30px; height: 30px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.1s, border-color 0.1s, background 0.1s;
  }
  .action-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }
  .action-btn.danger:hover { color: #C06; border-color: #C06; background: rgba(204,0,102,0.06); }

  /* MONTH DOTS (year view style) */
  .year-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }
  .month-chip {
    padding: 6px 14px;
    border-radius: var(--radius-tag);
    border: 1px solid var(--line);
    font-size: 12px;
    font-weight: 300;
    color: var(--text-muted);
    background: var(--bg-card);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .month-chip:hover { border-color: var(--accent); color: var(--accent); }
  .month-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .month-chip .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.5;
  }
  .month-chip .pct { opacity: 0.7; font-size: 10px; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 32px;
    right: 32px;
    width: 54px; height: 54px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 24px;
    font-weight: 300;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(155,127,168,0.4);
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .fab:hover {
    transform: scale(1.06);
    box-shadow: 0 8px 32px rgba(155,127,168,0.5);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    日程
  </div>
  <nav class="nav">
    <button class="nav-btn">年览</button>
    <button class="nav-btn active">月历</button>
    <button class="nav-btn">日程</button>
  </nav>
</header>

<main>
  <div class="page-header">
    <div class="page-title">六月</div>
    <div class="page-sub">2025 年 · 9 项计划</div>
  </div>

  <!-- Month chips (year view) -->
  <div class="year-chips">
    <div class="month-chip"><span class="dot"></span>一月<span class="pct">75%</span></div>
    <div class="month-chip"><span class="dot"></span>二月<span class="pct">60%</span></div>
    <div class="month-chip"><span class="dot"></span>三月<span class="pct">100%</span></div>
    <div class="month-chip"><span class="dot"></span>四月<span class="pct">50%</span></div>
    <div class="month-chip"><span class="dot"></span>五月<span class="pct">0%</span></div>
    <div class="month-chip active"><span class="dot"></span>六月<span class="pct">33%</span></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>本月完成度</span>
      <span><strong>3</strong> / 9 项</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
  </div>

  <!-- Plans -->
  <div class="date-group">
    <div class="date-label">6月30日 周一</div>
    <div class="card">
      <div class="cb"></div>
      <div class="card-body">
        <div class="card-title">完成 Q2 产品路线图评审</div>
        <div class="card-meta">10:00 — 11:30</div>
        <div class="card-tags">
          <span class="tag">工作</span>
          <span class="tag neutral">会议</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="action-btn">✎</button>
        <button class="action-btn danger">✕</button>
      </div>
    </div>
    <div class="card">
      <div class="cb"></div>
      <div class="card-body">
        <div class="card-title">准备周五的技术分享材料</div>
        <div class="card-meta">全天</div>
        <div class="card-tags">
          <span class="tag green">学习</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="action-btn">✎</button>
        <button class="action-btn danger">✕</button>
      </div>
    </div>
    <div class="card done">
      <div class="cb checked"></div>
      <div class="card-body">
        <div class="card-title">更新依赖包版本</div>
        <div class="card-meta">09:00 — 09:30</div>
      </div>
      <div class="card-actions">
        <button class="action-btn">✎</button>
        <button class="action-btn danger">✕</button>
      </div>
    </div>
  </div>

  <div class="date-group">
    <div class="date-label">6月28日 周六</div>
    <div class="card done">
      <div class="cb checked"></div>
      <div class="card-body">
        <div class="card-title">阅读《SICP》第三章</div>
        <div class="card-meta">14:00 — 16:00</div>
        <div class="card-tags">
          <span class="tag green">学习</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="action-btn">✎</button>
        <button class="action-btn danger">✕</button>
      </div>
    </div>
  </div>
</main>

<button class="fab" aria-label="新建计划">+</button>

</body>
</html>
