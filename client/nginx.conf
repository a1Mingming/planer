server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy — "backend" is resolved by Docker's internal DNS to the backend container
    location /api {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # SPA fallback — hard-refreshing /plans/month must return index.html, not 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Umi output filenames include content hashes, so long-term caching is safe
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
